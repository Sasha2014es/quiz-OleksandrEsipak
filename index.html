<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter-strike global offinsive</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="money-container"></div>

    <div class="app-container">
        <div id="start-screen" class="screen">
            <!-- Завдання 1 - Наповнення HTML -->
            <h2>Counter-strike global offinsive</h2>
            <button id="start-btn">Почати</button>
        </div>

        <div id="quiz-screen" class="screen hide ">
            <!-- Блок з таймером та балами -->
            <div class="header">
                <span id="timer">Час: 15</span>
                <span id="score-display">Бали: 0</span>
            </div>
            <h2 id="question-text">Запитання 1</h2>
            <div id="answers-container">
            </div>
        </div>

        <div id="result-screen" class="screen hide">
            <!-- Блок з результатом -->
            <h2>Квіз закінчено!</h2>
            <p class="result-text"></p>
            <button id="restart-btn">Спробувати ще раз</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
